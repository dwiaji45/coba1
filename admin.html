<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
    <div id="app" class="p-6">
        <div id="view-login" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg">
            <h2 class="text-2xl font-bold mb-6 text-slate-800">Admin Login</h2>
            <input type="text" id="adm-user" placeholder="Username Admin" class="w-full p-3 border rounded mb-4">
            <input type="password" id="adm-pass" placeholder="Password Admin" class="w-full p-3 border rounded mb-6">
            <button onclick="loginAdmin()" class="w-full bg-slate-800 text-white py-3 rounded font-bold">Masuk Panel</button>
        </div>

        <div id="view-admin" class="hidden space-y-6">
            <div class="flex justify-between items-center">
                <h1 class="text-2xl font-bold text-slate-800">CBT Management</h1>
                <button onclick="location.reload()" class="text-red-500 font-medium">Logout</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-white p-6 rounded-xl shadow">
                    <h3 class="font-bold border-b pb-2 mb-4 text-blue-600">Rekap Nilai Siswa</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left">
                            <thead><tr class="border-b"><th>Nama</th><th>Kelas</th><th>Skor</th></tr></thead>
                            <tbody id="table-nilai"></tbody>
                        </table>
                    </div>
                </div>

                <div class="bg-white p-6 rounded-xl shadow">
                    <h3 class="font-bold border-b pb-2 mb-4 text-green-600">Tambah Bank Soal</h3>
                    <textarea id="csv-input" placeholder="Copy-paste data soal (Format CSV dari Excel)" class="w-full h-32 p-3 border rounded text-xs mb-2"></textarea>
                    <button onclick="simpanSoal()" class="w-full bg-green-600 text-white py-2 rounded">Simpan Masal</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbyh3gvSJ7IXTqEdZuUUfFy_iUxYRW6tawsKd57FDMGp-XpSr-C54XNRIFhnhtIB1X1G1A/exec";
        async function req(data) {
            const res = await fetch(API, { method: 'POST', body: JSON.stringify(data) });
            return res.json();
        }

        async function loginAdmin() {
            const res = await req({ action: "login_admin", username: document.getElementById('adm-user').value, password: document.getElementById('adm-pass').value });
            if(res.status === "success") {
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-admin').classList.remove('hidden');
                loadData();
            } else alert("Ditolak!");
        }

        async function loadData() {
            const res = await req({ action: "get_admin_data" });
            const body = document.getElementById('table-nilai');
            body.innerHTML = res.hasil.slice(1).map(h => `
                <tr class="border-b"><td>${h[0]}</td><td>${h[1]}</td><td class="font-bold">${h[3]}</td></tr>
            `).join('');
        }

        async function simpanSoal() {
            const raw = document.getElementById('csv-input').value;
            // Logika sederhana memecah baris (Sangat fleksibel)
            const rows = raw.split("\n").map(r => r.split("\t")); 
            const res = await req({ action: "save_soal", data: rows });
            if(res.status === "success") alert("Berhasil simpan!");
        }
    </script>
</body>
</html>
