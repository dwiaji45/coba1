<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin CBT DD</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.ckeditor.com/4.22.1/standard/ckeditor.js"></script>

<style>
body { background:#fefefe; }
</style>
</head>

<body class="p-3">

<div class="container">
    <h3>Bank Soal</h3>

    <button class="btn btn-success mb-3" onclick="openModal('add')">
        + Tambah Soal
    </button>

    <table class="table table-bordered">
        <thead>
            <tr>
                <th>ID</th>
                <th>Tipe</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="tblSoal"></tbody>
    </table>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalSoal">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Form Soal</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <form id="formSoal">

                    <input type="text" id="s_id" class="form-control mb-2" placeholder="ID Soal">

                    <select id="s_tipe" class="form-control mb-2">
                        <option value="pg">Pilihan Ganda</option>
                        <option value="essay">Essay</option>
                    </select>

                    <textarea id="editorSoal"></textarea>

                    <hr>

                    <textarea id="s_opsA"></textarea>
                    <textarea id="s_opsB"></textarea>
                    <textarea id="s_opsC"></textarea>
                    <textarea id="s_opsD"></textarea>

                    <input type="text" id="s_kunci" class="form-control mt-2" placeholder="Kunci Jawaban">

                </form>

            </div>

            <div class="modal-footer">
                <button class="btn btn-primary" onclick="simpanSoal()">Simpan</button>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
let modal;
let currentMode = 'add';

/* =========================
   INIT
========================= */
window.onload = () => {
    modal = new bootstrap.Modal(document.getElementById('modalSoal'));
};

/* =========================
   OPEN MODAL (FIX CKEDITOR)
========================= */
function openModal(mode, data = null) {

    currentMode = mode;

    // RESET FORM
    document.getElementById('formSoal').reset();

    // HANCURKAN CKEDITOR (WAJIB)
    destroyEditor();

    // TAMPILKAN MODAL DULU
    modal.show();

    // INIT SETELAH MUNCUL
    document.getElementById('modalSoal')
        .addEventListener('shown.bs.modal', function handler() {

        document.getElementById('modalSoal')
            .removeEventListener('shown.bs.modal', handler);

        initEditor();

        // MODE EDIT
        if(mode === 'edit' && data){
            document.getElementById('s_id').value = data.id;
            document.getElementById('s_tipe').value = data.tipe;
            document.getElementById('s_kunci').value = data.kunci;

            CKEDITOR.instances.editorSoal.setData(data.soal || '');
            CKEDITOR.instances.s_opsA.setData(data.a || '');
            CKEDITOR.instances.s_opsB.setData(data.b || '');
            CKEDITOR.instances.s_opsC.setData(data.c || '');
            CKEDITOR.instances.s_opsD.setData(data.d || '');
        }
    });
}

/* =========================
   INIT CKEDITOR (FIX)
========================= */
function initEditor() {

    CKEDITOR.replace('editorSoal', { height:150 });

    CKEDITOR.replace('s_opsA');
    CKEDITOR.replace('s_opsB');
    CKEDITOR.replace('s_opsC');
    CKEDITOR.replace('s_opsD');
}

/* =========================
   DESTROY CKEDITOR
========================= */
function destroyEditor() {
    for(let name in CKEDITOR.instances) {
        CKEDITOR.instances[name].destroy(true);
    }
}

/* =========================
   SIMPAN SOAL
========================= */
function simpanSoal() {

    const data = {
        id: document.getElementById('s_id').value,
        tipe: document.getElementById('s_tipe').value,
        soal: CKEDITOR.instances.editorSoal.getData(),
        a: CKEDITOR.instances.s_opsA.getData(),
        b: CKEDITOR.instances.s_opsB.getData(),
        c: CKEDITOR.instances.s_opsC.getData(),
        d: CKEDITOR.instances.s_opsD.getData(),
        kunci: document.getElementById('s_kunci').value
    };

    console.log("DATA SOAL:", data);

    alert("Soal berhasil disimpan (dummy)");
}
</script>

</body>
</html>
