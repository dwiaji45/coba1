<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Simpel - Ujian Online</title>
    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { max-width: 700px; width: 100%; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: var(--primary); }
        .form-group { margin-bottom: 15px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .soal-card { border-bottom: 1px solid #eee; padding: 20px 0; }
        .pilihan { margin: 10px 0; cursor: pointer; display: block; }
        .btn { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; width: 100%; font-size: 16px; transition: 0.3s; }
        .btn:hover { background: var(--accent); }
        #area-ujian { display: none; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>CBT Online</h1>
    
    <div id="area-login">
        <div class="form-group">
            <input type="text" id="nama" placeholder="Masukkan Nama Lengkap" required>
        </div>
        <div class="form-group">
            <input type="text" id="kelas" placeholder="Kelas (Contoh: 9A)" required>
        </div>
        <button class="btn" onclick="mulaiUjian()">Mulai Ujian</button>
    </div>

    <div id="area-ujian">
        <div id="konten-soal">
            <p>Memuat soal...</p>
        </div>
        <button class="btn" onclick="submitJawaban()">Kirim Jawaban</button>
    </div>

    <div id="area-hasil" class="hidden">
        <h2>Terima Kasih!</h2>
        <p id="pesan-skor"></p>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbyPPKtOMbMGXzAQlU5pQ6_pTZSqStupV481GpJnLI3fmqrCUWTtYC316Rpbi9KHjRfdHA/exec"; // <--- GANTI DENGAN URL GAS ANDA
    let daftarSoal = [];
    let jawabanSiswa = {};

    async function mulaiUjian() {
        const nama = document.getElementById('nama').value;
        const kelas = document.getElementById('kelas').value;

        if (!nama || !kelas) return alert("Isi nama dan kelas!");

        document.getElementById('area-login').classList.add('hidden');
        document.getElementById('area-ujian').style.display = 'block';

        try {
            const response = await fetch(GAS_URL);
            daftarSoal = await response.json();
            tampilkanSoal();
        } catch (e) {
            alert("Gagal mengambil soal. Pastikan URL GAS benar dan sudah di-deploy.");
        }
    }

    function tampilkanSoal() {
        const wadah = document.getElementById('konten-soal');
        wadah.innerHTML = "";

        daftarSoal.forEach((s, index) => {
            const div = document.createElement('div');
            div.className = 'soal-card';
            div.innerHTML = `
                <p><strong>${index + 1}. ${s.Pertanyaan}</strong></p>
                <label class="pilihan"><input type="radio" name="soal${s.No}" value="A" onchange="pilihJawaban('${s.No}', 'A')"> A. ${s["Opsi A"]}</label>
                <label class="pilihan"><input type="radio" name="soal${s.No}" value="B" onchange="pilihJawaban('${s.No}', 'B')"> B. ${s["Opsi B"]}</label>
                <label class="pilihan"><input type="radio" name="soal${s.No}" value="C" onchange="pilihanJawaban('${s.No}', 'C')"> C. ${s["Opsi C"]}</label>
                <label class="pilihan"><input type="radio" name="soal${s.No}" value="D" onchange="pilihJawaban('${s.No}', 'D')"> D. ${s["Opsi D"]}</label>
            `;
            wadah.appendChild(div);
        });
    }

    function pilihJawaban(noSoal, pilihan) {
        jawabanSiswa[noSoal] = pilihan;
    }

    async function submitJawaban() {
        if (!confirm("Yakin ingin mengirim jawaban?")) return;

        const dataKirim = {
            nama: document.getElementById('nama').value,
            kelas: document.getElementById('kelas').value,
            jawaban: jawabanSiswa
        };

        document.getElementById('area-ujian').innerHTML = "<p>Sedang mengirim dan menghitung skor...</p>";

        try {
            const res = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify(dataKirim)
            });
            const hasil = await res.json();
            
            document.getElementById('area-ujian').style.display = 'none';
            document.getElementById('area-hasil').classList.remove('hidden');
            document.getElementById('pesan-skor').innerText = `Skor Anda: ${hasil.skor}`;
        } catch (e) {
            alert("Terjadi kesalahan saat mengirim jawaban.");
        }
    }
</script>

</body>
</html>
