<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rumah Bekam Monggang | Terapi Profesional</title>

        tailwind.config = {
            theme: { extend: { colors: { green: { 800: '#1e3f20', 900: '#142c16' }, gold: { 500: '#d4af37', 600: '#b5952f' } } } }
        }
    </script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased flex flex-col min-h-screen">

    <nav class="bg-green-900 text-white sticky top-0 z-40 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="index.html" class="font-bold text-xl tracking-wider text-gold-500">RUMAH BEKAM MONGGANG</a>
                <div class="hidden md:flex items-center space-x-4">
                    <a href="index.html" class="text-gold-500 px-3 py-2 font-medium transition border-b-2 border-gold-500">Beranda</a>
                    <a href="layanan.html" class="hover:text-gold-500 px-3 py-2 font-medium transition">Layanan</a>
                    <a href="artikel.html" class="hover:text-gold-500 px-3 py-2 font-medium transition">Artikel</a>
                    <a href="kontak.html" class="hover:text-gold-500 px-3 py-2 font-medium transition">Kontak</a>
                    <button onclick="toggleLoginModal()" class="ml-4 bg-gold-500 hover:bg-gold-600 text-white px-4 py-2 rounded-md font-medium transition shadow-md">Reservasi</button>
                </div>
            </div>
        </div>
    </nav>

    <section class="bg-white flex-grow">
        <div class="max-w-7xl mx-auto px-4 py-20 text-center sm:px-6 lg:px-8">
            <h1 class="text-4xl md:text-5xl font-extrabold text-green-900 mb-6 leading-tight">Kembalikan Kebugaran Tubuh<br/>Secara Alami</h1>
            <p class="text-lg text-gray-600 mb-8 max-w-2xl mx-auto">Layanan terapi bekam profesional dengan standar kebersihan tinggi dan terapis bersertifikat. Solusi tepat untuk memelihara kesehatan holistik Anda.</p>
            <button onclick="toggleLoginModal()" class="bg-green-800 hover:bg-green-900 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105">Buat Jadwal Sekarang</button>
        </div>
    </section>

    <a href="https://wa.me/62816847468" target="_blank" aria-label="Chat WhatsApp" class="fixed bottom-6 right-6 md:bottom-8 md:right-8 bg-[#25D366] text-white w-14 h-14 md:w-16 md:h-16 rounded-full shadow-2xl hover:bg-green-600 transform transition hover:-translate-y-2 z-50 flex items-center justify-center">
        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="w-8 h-8 md:w-10 md:h-10" viewBox="0 0 16 16">
            <path d="M13.601 2.326A7.85 7.85 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.93 7.93 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.9 7.9 0 0 0 13.6 2.326zM7.994 14.538a6.27 6.27 0 0 1-3.182-.86l-.228-.135-2.364.62.63-2.302-.148-.235a6.27 6.27 0 0 1-.958-3.321c0-3.46 2.81-6.272 6.27-6.272 1.677 0 3.256.653 4.441 1.84a6.25 6.25 0 0 1 1.84 4.44c-.001 3.457-2.81 6.268-6.265 6.268z"/>
            <path d="M11.87 9.61c-.32-.16-1.894-.936-2.188-1.042-.294-.107-.508-.16-.722.16-.214.32-.832 1.042-1.02 1.256-.187.214-.375.24-.694.08-.32-.16-1.35-.498-2.573-1.593-.95-.85-1.59-1.9-1.776-2.22-.188-.32-.02-.493.14-.653.14-.14.32-.375.48-.56.16-.188.214-.32.32-.534.106-.214.053-.402-.027-.562-.08-.16-.722-1.74-.99-2.383-.26-.623-.523-.538-.722-.548-.187-.01-.402-.01-.616-.01-.214 0-.56.08-.853.398-.293.32-1.12 1.094-1.12 2.667 0 1.573 1.146 3.094 1.306 3.308.16.214 2.25 3.435 5.45 4.74.767.313 1.365.498 1.833.638.767.23 1.466.197 2.016.12.616-.086 1.894-.775 2.16-1.524.266-.75.266-1.393.187-1.524-.08-.13-.293-.214-.613-.375z"/>
        </svg>
    </a>

    <div id="modal-reservasi" class="fixed inset-0 bg-gray-900 bg-opacity-75 hidden flex items-center justify-center z-50 px-4">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-md p-6 relative">
            <button onclick="toggleLoginModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 font-bold text-xl">&times;</button>
            <h3 class="text-2xl font-bold text-green-900 mb-6 text-center">Formulir Reservasi</h3>
            
            <form id="formReservasi" onsubmit="submitReservasi(event)">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">Nama Lengkap</label>
                    <input type="text" id="res_nama" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-800 focus:border-green-800">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">Nomor WhatsApp</label>
                    <input type="tel" id="res_hp" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-800 focus:border-green-800">
                </div>
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-700">Tanggal Terapi</label>
                    <input type="date" id="res_tanggal" required class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-800 focus:border-green-800">
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-medium text-gray-700">Keluhan</label>
                    <textarea id="res_keluhan" rows="3" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-green-800 focus:border-green-800"></textarea>
                </div>
                <button type="submit" id="btn-submit" class="w-full bg-green-800 text-white font-bold py-2 px-4 rounded hover:bg-green-900 transition shadow-md">Kirim Reservasi</button>
                <p id="form-pesan" class="mt-3 text-center text-sm hidden font-medium"></p>
            </form>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz0UPb8fuwA8PqaqFgpjOjgsyDbCsFO_TGci1pILKwYcndfxRZLIIOyqu4HqnHdSVqe7w/exec'; 

        function toggleLoginModal() {
            const modal = document.getElementById('modal-reservasi');
            modal.classList.toggle('hidden');
        }

        async function submitReservasi(event) {
            event.preventDefault();
            const btn = document.getElementById('btn-submit');
            const pesan = document.getElementById('form-pesan');
            btn.innerText = 'Mengirim...';
            btn.disabled = true;

            const payload = {
                action: 'reservasi',
                nama: document.getElementById('res_nama').value,
                hp: document.getElementById('res_hp').value,
                tanggal: document.getElementById('res_tanggal').value,
                keluhan: document.getElementById('res_keluhan').value
            };

            try {
                const response = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
                const result = await response.json();

                pesan.classList.remove('hidden');
                if(result.status === 'success') {
                    pesan.className = "mt-3 text-center text-sm text-green-600 font-medium";
                    pesan.innerText = "Reservasi Berhasil! Kami akan menghubungi Anda via WA.";
                    document.getElementById('formReservasi').reset();
                    setTimeout(toggleLoginModal, 3000); 
                } else {
                    pesan.className = "mt-3 text-center text-sm text-red-600 font-medium";
                    pesan.innerText = result.message;
                }
            } catch (error) {
                pesan.classList.remove('hidden');
                pesan.className = "mt-3 text-center text-sm text-red-600 font-medium";
                pesan.innerText = "Terjadi kesalahan jaringan.";
            } finally {
                btn.innerText = 'Kirim Reservasi';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
