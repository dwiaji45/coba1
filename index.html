<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Sistem Absensi Karyawan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .sidebar { height: 100vh; background: #2c3e50; color: white; position: fixed; width: 240px; transition: 0.3s; }
        .content { margin-left: 240px; padding: 30px; transition: 0.3s; }
        .nav-link { color: rgba(255,255,255,0.7); cursor: pointer; padding: 15px 20px; border-bottom: 1px solid #34495e; }
        .nav-link:hover, .nav-link.active { color: white; background: #34495e; }
        #reader { width: 100%; max-width: 400px; margin: auto; border-radius: 10px; overflow: hidden; }
        @media (max-width: 768px) {
            .sidebar { width: 0; overflow: hidden; }
            .content { margin-left: 0; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="p-4"><h4>ABSENSI V1</h4><small id="userRole">Loading...</small></div>
    <div class="nav-link active" onclick="showPage('dashboard')">Dashboard</div>
    <div class="nav-link" onclick="showPage('riwayat')">Riwayat Saya</div>
    <div class="nav-link" onclick="showPage('izin')">Izin / Cuti</div>
    <div id="adminMenu" style="display:none;">
        <div class="nav-link text-warning" onclick="showPage('admin')">Admin Panel</div>
    </div>
</div>

<div class="content">
    <div id="page-dashboard" class="page">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 id="welcomeText">Halo, Karyawan</h2>
            <div id="clock" class="h4 fw-bold">00:00:00</div>
        </div>
        
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm border-0">
                    <div class="card-body text-center">
                        <h5 class="mb-3">Scanner Kehadiran</h5>
                        <div id="reader"></div>
                        <div class="mt-3">
                            <button class="btn btn-success me-2" onclick="startScan('Masuk')">Absen Masuk</button>
                            <button class="btn btn-danger" onclick="startScan('Pulang')">Absen Pulang</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm border-0 p-3">
                    <h5>Status Hari Ini</h5>
                    <p class="text-muted">Pastikan GPS aktif sebelum melakukan scan.</p>
                    <hr>
                    <div id="todayStatus">Belum ada aktivitas.</div>
                </div>
            </div>
        </div>
    </div>

    <div id="page-riwayat" class="page" style="display:none;">
        <h2>Riwayat Kehadiran</h2>
        <div class="card shadow-sm border-0 p-3 mt-3">
            <table class="table table-hover">
                <thead><tr><th>Waktu</th><th>Status</th><th>Metode</th><th>Lokasi</th></tr></thead>
                <tbody id="riwayatBody"></tbody>
            </table>
        </div>
    </div>

    <div id="page-admin" class="page" style="display:none;">
        <div class="d-flex justify-content-between">
            <h2>Rekap Absensi Karyawan</h2>
            <button class="btn btn-outline-success" onclick="downloadExcel()">Export Excel</button>
        </div>
        <div class="card shadow-sm border-0 p-3 mt-3">
            <div class="table-responsive">
                <table class="table" id="adminTable">
                    <thead><tr><th>Nama</th><th>Email</th><th>Waktu</th><th>Status</th><th>Link Maps</th></tr></thead>
                    <tbody id="adminBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    let currentStatus = "";
    const html5QrCode = new Html5Qrcode("reader");

    // Init App
    window.onload = () => {
        updateClock();
        setInterval(updateClock, 1000);
        checkUser();
    };

    function updateClock() {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }

    function checkUser() {
        google.script.run.withSuccessHandler(user => {
            if(!user.found) {
                Swal.fire("Akses Ditolak", "Email " + user.email + " tidak terdaftar.", "error");
                document.body.innerHTML = "<h1 class='text-center mt-5'>403 Forbidden</h1>";
                return;
            }
            document.getElementById('welcomeText').innerText = "Halo, " + user.nama;
            document.getElementById('userRole').innerText = user.jabatan + " (" + user.role + ")";
            if(user.role === 'Admin') document.getElementById('adminMenu').style.display = 'block';
        }).getUserInfo();
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.style.display = 'none');
        document.getElementById('page-' + pageId).style.display = 'block';
        if(pageId === 'riwayat') loadRiwayat();
        if(pageId === 'admin') loadAdminData();
    }

    function startScan(status) {
        currentStatus = status;
        const config = { fps: 10, qrbox: 250 };
        html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
    }

    function onScanSuccess(decodedText) {
        html5QrCode.stop();
        Swal.fire({ title: 'Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

        navigator.geolocation.getCurrentPosition(pos => {
            google.script.run.withSuccessHandler(res => {
                if(res.includes("Error")) Swal.fire("Gagal", res, "error");
                else Swal.fire("Berhasil", res, "success");
            }).simpanAbsen(currentStatus, pos.coords.latitude, pos.coords.longitude, decodedText);
        }, err => {
            Swal.fire("GPS Error", "Aktifkan lokasi di browser Anda!", "error");
        });
    }

    function loadRiwayat() {
        google.script.run.withSuccessHandler(data => {
            let html = "";
            data.forEach((row, i) => {
                if(i==0) return;
                html += `<tr><td>${new Date(row[0]).toLocaleString()}</td><td>${row[3]}</td><td>${row[5]}</td><td><a href="${row[4]}" target="_blank">Lihat</a></td></tr>`;
            });
            document.getElementById('riwayatBody').innerHTML = html;
        }).getRiwayatUser();
    }

    function loadAdminData() {
        google.script.run.withSuccessHandler(data => {
            let html = "";
            data.forEach((row, i) => {
                if(i==0) return;
                html += `<tr><td>${row[1]}</td><td>${row[2]}</td><td>${new Date(row[0]).toLocaleString()}</td><td>${row[3]}</td><td><a href="${row[4]}">Link</a></td></tr>`;
            });
            document.getElementById('adminBody').innerHTML = html;
        }).getAllDataAbsensi();
    }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
