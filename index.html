<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem CBT Terintegrasi</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">

    <div id="page-login" class="flex items-center justify-center min-h-screen">
        <div class="bg-white p-8 rounded-xl shadow-md w-96">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-600">Login CBT</h2>
            <input type="text" id="user" placeholder="Username" class="w-full p-2 mb-4 border rounded">
            <input type="password" id="pass" placeholder="Password" class="w-full p-2 mb-4 border rounded">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Masuk</button>
        </div>
    </div>

    <div id="page-admin" class="hidden p-6">
        <nav class="bg-white p-4 rounded-lg shadow mb-6 flex justify-between items-center">
            <h2 class="font-bold text-xl">Admin Dashboard</h2>
            <button onclick="location.reload()" class="text-red-500">Logout</button>
        </nav>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded shadow">
                <h3 class="font-bold mb-4">Manajemen Soal</h3>
                <button class="bg-green-500 text-white px-4 py-2 rounded text-sm">Upload Excel Soal</button>
            </div>
            <div class="bg-white p-6 rounded shadow">
                <h3 class="font-bold mb-4">Hasil Ujian</h3>
                <button onclick="downloadHasil()" class="bg-blue-500 text-white px-4 py-2 rounded text-sm">Unduh CSV Hasil</button>
            </div>
            <div class="bg-white p-6 rounded shadow">
                <h3 class="font-bold mb-4">Data Peserta</h3>
                <p id="stat-peserta">Memuat...</p>
            </div>
        </div>
    </div>

    <div id="page-siswa" class="hidden p-6">
        <div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow">
            <h2 id="welcome-msg" class="text-xl font-bold mb-4">Halo, Siswa</h2>
            <div id="list-ujian" class="space-y-4">
                <p>Mencari jadwal ujian aktif...</p>
            </div>
        </div>
    </div>

    <div id="page-test" class="hidden p-6">
        <div class="max-w-3xl mx-auto bg-white p-8 rounded shadow">
            <div class="flex justify-between border-b pb-4 mb-4">
                <h3 id="test-title" class="font-bold">Ujian</h3>
                <div id="timer" class="text-red-600 font-mono text-xl">00:00</div>
            </div>
            <div id="soal-container"></div>
            <button onclick="submitTest()" class="mt-6 w-full bg-green-600 text-white py-3 rounded font-bold">KIRIM JAWABAN</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyPPKtOMbMGXzAQlU5pQ6_pTZSqStupV481GpJnLI3fmqrCUWTtYC316Rpbi9KHjRfdHA/exec"; 
        let userNow = {};
        let currentSoal = [];
        let jawabanSiswa = {};
        let activeKode = "";

        async function api(data) {
            const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(data) });
            return res.json();
        }

        async function handleLogin() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const res = await api({ action: "login", username: u, password: p });
            
            if (res.status === "success") {
                userNow = res;
                document.getElementById('page-login').classList.add('hidden');
                if (res.role === 'admin') showAdmin();
                else showSiswa();
            } else alert(res.message);
        }

        async function showSiswa() {
            document.getElementById('page-siswa').classList.remove('hidden');
            document.getElementById('welcome-msg').innerText = `Selamat Datang, ${userNow.nama}`;
            const res = await api({ action: "getJadwal" });
            const container = document.getElementById('list-ujian');
            container.innerHTML = res.data.map(j => `
                <div class="p-4 border rounded flex justify-between items-center">
                    <div>
                        <p class="font-bold">${j.nama}</p>
                        <p class="text-sm text-gray-500">${j.durasi} Menit</p>
                    </div>
                    <button onclick="startUjian('${j.kode}', '${j.nama}', ${j.durasi})" class="bg-blue-600 text-white px-4 py-2 rounded">Mulai</button>
                </div>
            `).join('');
        }

        async function startUjian(kode, nama, durasi) {
            activeKode = kode;
            const res = await api({ action: "getSoal", kodeSoal: kode });
            currentSoal = res.data;
            document.getElementById('page-siswa').classList.add('hidden');
            document.getElementById('page-test').classList.remove('hidden');
            document.getElementById('test-title').innerText = nama;
            
            // Render Soal
            document.getElementById('soal-container').innerHTML = currentSoal.map((s, i) => `
                <div class="mb-6 border-b pb-4">
                    <p class="font-medium mb-2">${i+1}. ${s.tanya}</p>
                    ${['a','b','c','d'].map(opt => `
                        <label class="block p-2 hover:bg-gray-50 cursor-pointer">
                            <input type="radio" name="q${s.no}" value="${opt.toUpperCase()}" onchange="jawabanSiswa['${s.no}']='${opt.toUpperCase()}'"> 
                            ${opt.toUpperCase()}. ${s[opt]}
                        </label>
                    `).join('')}
                </div>
            `).join('');

            // Simple Timer
            let time = durasi * 60;
            const interval = setInterval(() => {
                let m = Math.floor(time / 60);
                let s = time % 60;
                document.getElementById('timer').innerText = `${m}:${s < 10 ? '0'+s : s}`;
                if (time <= 0) { clearInterval(interval); submitTest(); }
                time--;
            }, 1000);
        }

        async function submitTest() {
            const res = await api({
                action: "submitUjian",
                nama: userNow.nama,
                kelas: userNow.kelas,
                kodeSoal: activeKode,
                jawaban: jawabanSiswa
            });
            alert("Ujian Selesai! Skor Anda: " + res.skor);
            location.reload();
        }

        async function showAdmin() {
            document.getElementById('page-admin').classList.remove('hidden');
            const res = await api({ action: "getAdminData" });
            document.getElementById('stat-peserta').innerText = `Total Peserta: ${res.peserta.length - 1}`;
        }

        function downloadHasil() {
            // Logika sederhana export CSV bisa ditambahkan di sini
            alert("Fitur download sedang disiapkan.");
        }
    </script>
</body>
</html>
