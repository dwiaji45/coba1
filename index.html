<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBT Siswa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 font-sans">
    <div id="app" class="max-w-xl mx-auto min-h-screen flex items-center justify-center p-4">
        <div id="view-login" class="bg-white p-8 rounded-2xl shadow-xl w-full">
            <h2 class="text-2xl font-bold text-center text-blue-600 mb-6">Login Siswa</h2>
            <input type="text" id="user" placeholder="Username" class="w-full p-3 border rounded-lg mb-4">
            <input type="password" id="pass" placeholder="Password" class="w-full p-3 border rounded-lg mb-4">
            <button onclick="login()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold">Masuk Ujian</button>
        </div>

        <div id="view-dash" class="hidden w-full">
            <h2 id="greet" class="text-xl font-bold mb-4"></h2>
            <div id="jadwal-list" class="space-y-3"></div>
        </div>

        <div id="view-exam" class="hidden w-full bg-white p-6 rounded-xl shadow-lg">
            <div class="flex justify-between border-b pb-2 mb-4">
                <span id="exam-name" class="font-bold"></span>
                <span id="timer" class="text-red-600 font-mono">00:00</span>
            </div>
            <div id="soal-box" class="space-y-6"></div>
            <button onclick="kirimJawaban()" class="w-full bg-green-600 text-white py-4 rounded-xl mt-8 font-bold">KIRIM JAWABAN</button>
        </div>
    </div>

    <script>
        const API = "https://script.google.com/macros/s/AKfycbyh3gvSJ7IXTqEdZuUUfFy_iUxYRW6tawsKd57FDMGp-XpSr-C54XNRIFhnhtIB1X1G1A/exec";
        let userData = {};
        let activeSoal = [];
        let jawaban = {};
        let kodeAktif = "";

        async function req(data) {
            const res = await fetch(API, { method: 'POST', body: JSON.stringify(data) });
            return res.json();
        }

        async function login() {
            const res = await req({ action: "login_siswa", username: user.value, password: pass.value });
            if(res.status === "success") {
                userData = res;
                document.getElementById('view-login').classList.add('hidden');
                document.getElementById('view-dash').classList.remove('hidden');
                greet.innerText = `Halo, ${res.nama} (${res.kelas})`;
                loadJadwal();
            } else alert(res.message);
        }

        async function loadJadwal() {
            const res = await req({ action: "get_jadwal" });
            const cont = document.getElementById('jadwal-list');
            cont.innerHTML = res.data.map(j => `
                <div class="bg-white p-4 rounded-lg shadow border flex justify-between items-center">
                    <span>${j.nama} (${j.durasi}m)</span>
                    <button onclick="mulai('${j.kode}', '${j.nama}', ${j.durasi})" class="bg-blue-500 text-white px-4 py-1 rounded">Mulai</button>
                </div>
            `).join('');
        }

        async function mulai(kode, nama, durasi) {
            if(!confirm('Mulai ujian sekarang?')) return;
            kodeAktif = kode;
            const res = await req({ action: "get_soal", kodeSoal: kode });
            activeSoal = res.data;
            document.getElementById('view-dash').classList.add('hidden');
            document.getElementById('view-exam').classList.remove('hidden');
            document.getElementById('exam-name').innerText = nama;
            renderSoal();
            startTimer(durasi);
        }

        function renderSoal() {
            document.getElementById('soal-box').innerHTML = activeSoal.map((s,i) => `
                <div>
                    <p class="font-bold">${i+1}. ${s.tanya}</p>
                    ${['a','b','c','d'].map(opt => `
                        <label class="block p-2 border rounded mt-2 cursor-pointer hover:bg-gray-50">
                            <input type="radio" name="q${s.no}" onchange="jawaban['${s.no}']='${opt.toUpperCase()}'"> ${opt.toUpperCase()}. ${s[opt]}
                        </label>
                    `).join('')}
                </div>
            `).join('');
        }

        function startTimer(m) {
            let s = m * 60;
            const t = document.getElementById('timer');
            const inv = setInterval(() => {
                let min = Math.floor(s/60);
                let sec = s % 60;
                t.innerText = `${min}:${sec < 10 ? '0'+sec : sec}`;
                if(s <= 0) { clearInterval(inv); kirimJawaban(); }
                s--;
            }, 1000);
        }

        async function kirimJawaban() {
            const res = await req({ action: "submit_ujian", nama: userData.nama, kelas: userData.kelas, kodeSoal: kodeAktif, jawaban: jawaban });
            alert("Selesai! Skor: " + res.skor);
            location.reload();
        }
    </script>
</body>
</html>
